name: aditya_globals
description: Aditya Globals - Live classes, quizzes & doubt chat for Class 6-10 and Intermediate students.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/
